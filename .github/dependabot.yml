version: 2
updates:
  # NPM runtime + dev dependencies.
  # mcp-audit is a security tool — we want every upstream bump to get
  # an immediate PR so transitive CVEs never linger, but we stay on
  # the same major of each dep until we deliberately upgrade.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    ignore:
      # Skip major version bumps — Dependabot still surfaces them as
      # security alerts via the separate "Dependabot alerts" feed; we
      # upgrade majors deliberately, not on autopilot.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      # Bundle noisy patch/minor dev updates into one weekly PR.
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Runtime patch-level updates in one PR too (still one-per-PR
      # for runtime minor bumps to keep blast radius small).
      runtime-patch:
        dependency-type: production
        update-types:
          - patch

  # Pin GitHub Actions to keep supply-chain surface small. Allow minor
  # and patch bumps — action majors tend to ship breaking Node/runner
  # requirements and we gate those behind manual review.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
