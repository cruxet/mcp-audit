name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  self-audit:
    name: Self-audit against fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - run: npm ci
      - run: npm run build

      - name: Safe fixtures must pass clean
        run: node dist/cli.js --config tests/fixtures/safe-configs/safe-http.json tests/fixtures/safe-configs/safe-npx.json --fail-on info

      - name: Vulnerable fixtures must fail with critical
        run: |
          set +e
          node dist/cli.js --config tests/fixtures/vulnerable-configs/vuln-bash-c.json --fail-on critical
          EXIT=$?
          if [ $EXIT -ne 4 ]; then
            echo "Expected exit code 4 (critical), got $EXIT"
            exit 1
          fi
